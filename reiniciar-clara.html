<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f6f5">
  <title>Reiniciando Mi Saldo</title>
  <style>
    body { margin: 0; display: grid; min-height: 100vh; place-items: center; background: #f4f6f5; color: #16211d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    p { margin: 24px; text-align: center; }
  </style>
</head>
<body>
  <p>Reiniciando tus datos de Mi Saldo…</p>
  <script>
    (async () => {
      ['clara-finanzas-v1', 'clara-finanzas-v2', 'clara-finanzas-v3', 'clara-finanzas-v4'].forEach(key => localStorage.removeItem(key));
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.filter(key => key.startsWith('clara-finanzas-')).map(key => caches.delete(key)));
      }
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(registration => registration.unregister()));
      }
      location.replace('./?inicio-vacio=2');
    })().catch(() => location.replace('./?inicio-vacio=2'));
  </script>
</body>
</html>
